{tab:'큰 흐름',type:'image',img:'zoom_2027_ratio.jpg',wide:true,call:'40·40·20은 유지.\n하지만 항목 설명은 더 촘촘해졌다.',caption:'2026에서 2027로 넘어가며 비율 자체보다 평가항목의 해석 단위가 더 중요해졌다.',side:`<div class="kicker">26→27</div><div class="bigPoint">비율은 유지되지만<br><em>평가 근거를 읽는 방식</em>이 정밀해집니다.</div><div class="quote">학업 40, 진로/자기주도 40, 공동체 20의 틀은 유지됩니다. 변화는 숫자가 아니라, 사례 코멘트가 무엇을 근거로 삼는지에서 나타납니다.</div>`},

{tab:'강조',type:'bars',caption:'2027에서 강화된 언어는 탐구, 융합, 문제, 경험이다. 활동의 개수가 아니라 배움이 확장되는 장면을 묻는다.',side:`<div class="kicker">STRENGTHENED</div><div class="bigPoint"><strong>탐구·융합·문제·경험</strong>이<br>2027의 핵심 신호입니다.</div><div class="quote">사례 코멘트의 뉘앙스도 “잘했다”가 아니라 “개념을 다양한 맥락에 적용하고 확장했다”는 방향으로 이동합니다.</div>`},
{tab:'약화',type:'barsDown',caption:'약화는 중요하지 않다는 뜻이 아니다. 전공명, 이수량, 성취도만으로는 학생의 성장 방향을 설명하기 어려워졌다는 뜻이다.',side:`<div class="kicker">WEAKENED</div><div class="bigPoint"><em>전공·이수·성취도</em>는<br>단독 근거로서의 힘이 약해집니다.</div><div class="lead">2027은 성취도와 이수 사실을 배제하지 않습니다. 다만 그것만으로 충분하지 않으며, 탐구 과정과 적용 맥락이 함께 있어야 평가 언어가 완성됩니다.</div>`},

{tab:'생활근거',type:'image',img:'zoom_2027_attend_service.jpg',wide:true,call:'출결·봉사도 공동체역량의 정성 근거가 된다.',caption:'2027은 출결과 봉사도 공동체역량의 정성평가 근거로 읽는다. 생활기록부 전반이 평가의 장면이 된다.',side:`<div class="kicker">EVIDENCE</div><div class="bigPoint">생활기록부는 한 칸이 아니라<br><em>전체 장면</em>으로 읽힙니다.</div><div class="lead">개근, 미인정 지각·조퇴·결석, 봉사활동의 실천성 등은 성실성과 규칙준수, 나눔과 배려의 근거가 됩니다.</div>`},
{tab:'엔딩',type:'ending',caption:'2027 경희 학종의 핵심은 이것이다. 배운 것을 문제로 연결하고, 전공의 언어로 해석하며, 공동체 속 실천으로 증명하는 학생.',side:`<div class="kicker">FINAL CUT</div><div class="h1">2027 핵심 방향</div><div class="card"><div class="bigPoint"><strong>질문</strong> → <strong>교과 개념</strong> → <strong>탐구 확장</strong> → <strong>전공/사회 맥락</strong> → <strong>공동체 실천</strong></div></div><div class="lead">이 흐름이 보이면 평가 언어가 살아납니다. 이 흐름이 없으면 성적과 활동은 흩어진 기록으로 남습니다.</div>`}

function sideHTML(s){return s.side||''}
function stageHTML(s){
 if(s.type==='covers')return `<div class="scene active"><div class="lens"></div><div class="covers"><img class="cover" src="${A}cover_2025.jpg"><img class="cover" src="${A}cover_2026.jpg"><img class="cover" src="${A}cover_2027.jpg"></div><div class="caption"><span class="kicker">DOCUMENTARY OPENING</span><br>${s.caption}</div></div>`;
 if(s.type==='talent')return `<div class="scene active"><div class="talentGrid"><div class="talentBox"><h2>2025·2026</h2><div class="bigPoint"><em>문화인</em><br><em>세계인</em><br><em>창조인</em></div><div class="lead">공동체, 세계시민, 융복합 전문인의 범주형 인재상</div></div><div class="talentBox"><h2>2027</h2><div class="bigPoint"><strong>성찰하는 지성인</strong><br><strong>공존하는 세계인</strong><br><strong>창조하는 미래인</strong></div><div class="lead">성찰·공존·미래 전환을 수행하는 행동형 인재상</div></div></div><div class="caption">${s.caption}</div></div>`;
 if(s.type==='image')return `<div class="scene active"><button class="viewbtn" onclick="openImg('${A+s.img}')">원문 크게 보기</button><div class="zoomFrame ${s.wide?'wide':''}"><img src="${A+s.img}"></div><div class="callout"><small>입학사정관 시선</small>${(s.call||'핵심 문장을 확대해 읽습니다.').replace(/\n/g,'<br>')}</div><div class="caption">${highlight(s.caption)}</div></div>`;
 if(s.type==='word')return `<div class="scene active wordStage"><div class="yearTag">PDF 어휘 빈도 분석 · 2026 → 2027</div>${wordTable()}<div class="caption">${highlight(s.caption)}</div></div>`;
 if(s.type==='bars')return `<div class="scene active barStage"><div class="yearTag">강화된 평가 언어</div><div class="trend">${bar('탐구',83,94)}${bar('융합',29,43)}${bar('문제',38,50)}${bar('경험',36,53)}${bar('배려',11,17)}${bar('성실',11,17)}${bar('규칙',9,16)}</div><div class="caption">${highlight(s.caption)}</div></div>`;
 if(s.type==='barsDown')return `<div class="scene active barStage"><div class="yearTag">상대적으로 약해진 단독 근거</div><div class="trend down">${bar('전공',139,110)}${bar('이수',89,67)}${bar('성취도',64,52)}${bar('진로',82,74)}${bar('공동체',30,19)}</div><div class="caption">${highlight(s.caption)}</div></div>`;
 return `<div class="scene active"><div class="endingText"><h1>2027 경희 학종은<br><span class="flashWord">배움을 문제로 연결하는 학생</span>을 읽는다.</h1></div><div class="caption">${highlight(s.caption)}</div></div>`;
}
function highlight(t){return t.replace(/2027|탐구|융합|문제|경험|공동체|전공|성찰|공존|미래|진로역량|학업역량/g,m=>`<span class="mint">${m}</span>`)}
function wordTable(){let terms=['탐구','융합','문제','경험','전공','이수','성취도','성찰','공존','배려','성실','규칙'];return `<div class="wordGrid">`+terms.map(t=>{let a=wordCounts['2026'][t]||0,b=wordCounts['2027'][t]||0;let d=b-a,cls=d>0?'up':d<0?'down':'';return `<div class="word ${cls}"><span>${t}</span><b>${a}→${b}</b><small>${d>0?'+':''}${d}</small></div>`}).join('')+`</div>`}
function bar(name,a,b){let max=Math.max(a,b,110),w1=Math.round(a/max*100),w2=Math.round(b/max*100),d=b-a;return `<div class="barrow"><div>${name}</div><div><div class="bar"><div class="fill" style="width:${w1}%"></div></div><div class="bar" style="margin-top:8px"><div class="fill" style="width:${w2}%"></div></div></div><div>${a}→${b}<br><span style="color:${d>=0?'#76ffe3':'#ff8ca5'}">${d>0?'+':''}${d}</span></div></div>`}
function navHTML(){return scenes.map((s,i)=>`<button onclick="go(${i})" class="${i===idx?'on':''}">${s.tab}</button>`).join('')}
function render(){let s=scenes[idx];document.getElementById('stage').innerHTML=stageHTML(s)+`<div class="progress"><i style="width:${(idx+1)/scenes.length*100}%"></i></div>`;document.getElementById('analysis').innerHTML=sideHTML(s);document.getElementById('navRail').innerHTML=navHTML()}
function next(){idx=(idx+1)%scenes.length;render();restart()}function prev(){idx=(idx-1+scenes.length)%scenes.length;render();restart()}function go(i){idx=i;render();restart()}function toggleAuto(){auto=!auto;document.getElementById('auto').textContent=auto?'자동재생 정지':'자동재생 시작';restart()}function restart(){if(timer)clearInterval(timer);if(auto)timer=setInterval(next,duration)}function openImg(src){event.stopPropagation();document.getElementById('modalImg').src=src;document.getElementById('modal').classList.add('show')}
render();restart();
</script></body></html>
